<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Like Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 600px;
    height: 340px;
    background: transparent;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, sans-serif;
  }

  #overlay {
    width: 600px;
    height: 340px;
    position: relative;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 0 40px;
    opacity: 0;
  }

  .bg-glow {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 50% 80% at 18% 50%, rgba(255,0,50,0.25) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 70% 50%, rgba(200,0,30,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  #hearts-canvas {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* Avatar */
  .avatar-wrap {
    position: relative;
    width: 155px;
    height: 155px;
    flex-shrink: 0;
  }

  .avatar-glow {
    position: absolute;
    inset: -22px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,0,60,0.55) 0%, transparent 70%);
    animation: pulse-glow 1.8s ease-in-out infinite;
  }

  .ring-red {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 3px solid rgba(255,40,60,0.9);
    box-shadow: 0 0 20px rgba(255,0,40,0.8), inset 0 0 15px rgba(200,0,30,0.3);
    animation: pulse-ring 1.8s ease-in-out infinite;
  }

  .ring-red2 {
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,60,80,0.35);
    animation: pulse-ring 1.8s ease-in-out infinite 0.4s;
  }

  .avatar-img {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid rgba(255,40,60,0.85);
    box-shadow: 0 0 25px rgba(255,0,50,0.6), 0 0 60px rgba(150,0,30,0.35), inset 0 0 20px rgba(0,0,0,0.5);
  }

  .avatar-img img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  /* Text */
  .text-wrap {
    margin-right: 34px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
    position: relative;
  }

  .username {
    font-size: 36px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 20px rgba(255,60,80,0.9), 0 0 40px rgba(200,0,30,0.5);
    letter-spacing: 1px;
    clip-path: inset(0 100% 0 0);
    animation: reveal-text 0.6s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
    direction: ltr;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 300px;
  }

  .arabic-text {
    font-size: 26px;
    font-weight: 700;
    color: #ff6080;
    text-shadow: 0 0 15px rgba(255,0,50,0.8), 0 0 30px rgba(200,0,30,0.5);
    clip-path: inset(0 100% 0 0);
    animation: reveal-text 0.6s cubic-bezier(0.16,1,0.3,1) 0.9s forwards;
    direction: rtl;
  }

  .heart-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, rgba(200,0,30,0.3), rgba(140,0,20,0.2));
    border: 1px solid rgba(255,40,60,0.45);
    border-radius: 20px;
    padding: 4px 14px;
    width: fit-content;
    opacity: 0;
    animation: fade-in 0.4s ease 1.2s forwards;
    box-shadow: 0 0 10px rgba(200,0,30,0.3);
  }

  .heart-icon-static {
    font-size: 16px;
    animation: heartbeat 1s ease infinite 1.5s;
    display: inline-block;
  }

  .badge-text {
    font-size: 13px;
    color: #ff8090;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* Shine */
  .shine-streak {
    position: absolute;
    top: 0; left: -100%;
    width: 60px; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,80,80,0.12), transparent);
    transform: skewX(-20deg);
    animation: shine 3s ease 1.5s infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.12); }
  }

  @keyframes pulse-ring {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.04); }
  }

  @keyframes reveal-text {
    to { clip-path: inset(0 0% 0 0); }
  }

  @keyframes fade-in {
    to { opacity: 1; }
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.4); }
  }

  @keyframes shine {
    0% { left: -100%; opacity: 0; }
    20% { opacity: 1; }
    100% { left: 150%; opacity: 0; }
  }

  @keyframes overlay-enter {
    0% { opacity: 0; transform: translateX(-40px) scale(0.95); }
    100% { opacity: 1; transform: translateX(0) scale(1); }
  }

  @keyframes overlay-exit {
    0% { opacity: 1; transform: translateX(0) scale(1); }
    100% { opacity: 0; transform: translateX(40px) scale(0.95); }
  }
</style>
</head>
<body>

<div id="overlay">
  <div class="bg-glow"></div>
  <canvas id="hearts-canvas"></canvas>
  <div class="shine-streak"></div>

  <div class="avatar-wrap">
    <div class="avatar-glow"></div>
    <div class="ring-red2"></div>
    <div class="ring-red"></div>
    <div class="avatar-img">
      <img id="avatar-img" src="https://i.postimg.cc/mD3rqWsn/Gemini-Generated-Image-3o7b5m3o7b5m3o7b.png" alt="avatar">
    </div>
  </div>

  <div class="text-wrap">
    <div id="username" class="username">Alice_Wonder</div>
    <div class="arabic-text" id="arabic-text">أرسل إعجاب</div>
    <div class="heart-badge">
      <span class="heart-icon-static">❤️</span>
      <span class="badge-text">إعجاب جديد</span>
    </div>
  </div>
</div>

<script>
// ─── Floating Hearts ───────────────────────────────────────────────
const canvas = document.getElementById('hearts-canvas');
const ctx = canvas.getContext('2d');
canvas.width = 600;
canvas.height = 340;

const hearts = [];

function createHeart() {
  const startX = 220 + Math.random() * 340;
  return {
    x: startX,
    y: 280 + Math.random() * 40,
    size: Math.random() * 18 + 8,
    vx: (Math.random() - 0.5) * 1.5,
    vy: -(Math.random() * 1.5 + 0.6),
    alpha: Math.random() * 0.5 + 0.5,
    life: 0,
    maxLife: Math.random() * 120 + 80,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: Math.random() * 0.06 + 0.02,
    color: `hsl(${Math.random() * 30 + 340}, 100%, ${Math.random() * 20 + 55}%)`
  };
}

for (let i = 0; i < 18; i++) {
  const h = createHeart();
  h.life = Math.random() * h.maxLife;
  hearts.push(h);
}

function drawHeart(ctx, x, y, size) {
  ctx.beginPath();
  ctx.moveTo(x, y + size * 0.3);
  ctx.bezierCurveTo(x, y, x - size * 0.5, y, x - size * 0.5, y + size * 0.3);
  ctx.bezierCurveTo(x - size * 0.5, y + size * 0.6, x, y + size * 0.9, x, y + size);
  ctx.bezierCurveTo(x, y + size * 0.9, x + size * 0.5, y + size * 0.6, x + size * 0.5, y + size * 0.3);
  ctx.bezierCurveTo(x + size * 0.5, y, x, y, x, y + size * 0.3);
  ctx.closePath();
}

function animHearts() {
  ctx.clearRect(0, 0, 600, 340);
  for (const h of hearts) {
    h.life++;
    if (h.life > h.maxLife) {
      Object.assign(h, createHeart());
      h.life = 0;
      continue;
    }
    const fade = 1 - h.life / h.maxLife;
    h.wobble += h.wobbleSpeed;
    const wx = Math.sin(h.wobble) * 3;
    const cx = h.x + wx + h.vx * h.life;
    const cy = h.y + h.vy * h.life;

    ctx.save();
    ctx.globalAlpha = h.alpha * fade;
    ctx.shadowBlur = 12;
    ctx.shadowColor = h.color;
    ctx.fillStyle = h.color;
    ctx.translate(cx, cy);
    ctx.rotate(Math.sin(h.wobble * 0.5) * 0.2);
    drawHeart(ctx, -h.size / 2, -h.size / 2, h.size);
    ctx.fill();
    ctx.restore();
  }
  requestAnimationFrame(animHearts);
}
animHearts();

// ─── Overlay control ───────────────────────────────────────────────
let currentTimer = null;

function showOverlay() {
  const el = document.getElementById('overlay');
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'overlay-enter 0.5s cubic-bezier(0.16,1,0.3,1) forwards';

  ['username', 'arabic-text'].forEach(id => {
    const el2 = document.getElementById(id);
    el2.style.animation = 'none';
    el2.offsetHeight;
  });
  document.getElementById('username').style.animation = 'reveal-text 0.6s cubic-bezier(0.16,1,0.3,1) 0.5s forwards';
  document.getElementById('arabic-text').style.animation = 'reveal-text 0.6s cubic-bezier(0.16,1,0.3,1) 0.9s forwards';

  if (currentTimer) clearTimeout(currentTimer);
  currentTimer = setTimeout(() => {
    el.style.animation = 'overlay-exit 0.5s ease forwards';
  }, 4500);
}

window.updateOverlay = function({ name, value, avatar } = {}) {
  if (name) document.getElementById('username').textContent = name;
  if (avatar) document.getElementById('avatar-img').src = avatar;
  showOverlay();
};

setTimeout(() => showOverlay(), 300);
</script>
</body>
</html>
