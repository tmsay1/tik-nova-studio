<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;font-family:'Tajawal',sans-serif;color:#fff;width:600px;height:340px;overflow:hidden}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:40px;pointer-events:none}
.like-counter{
  font-size:52px;font-weight:900;
  background:linear-gradient(135deg,#f43f5e,#fb923c,#fbbf24);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 20px rgba(244,63,94,.7));
  animation:countPulse .3s ease;text-align:center
}
@keyframes countPulse{0%{transform:scale(1.3)}100%{transform:scale(1)}}
.like-label{font-size:16px;color:#fb923c;letter-spacing:2px;margin-top:4px;text-align:center;text-shadow:0 0 10px #fb923c}
.heart-container{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.heart{position:absolute;bottom:-40px;font-size:28px;animation:floatHeart linear both;opacity:0}
@keyframes floatHeart{
  0%{transform:translateY(0) scale(0) rotate(0deg);opacity:1}
  20%{opacity:1;transform:translateY(-80px) scale(1.2) rotate(-10deg)}
  80%{opacity:.7}
  100%{transform:translateY(-320px) scale(.5) rotate(20deg);opacity:0}
}
.like-name{font-size:18px;color:#fff;text-align:center;margin-top:8px}
</style>
</head>
<body>
<div class="overlay" id="overlay">
  <div class="heart-container" id="heart-container"></div>
  <div class="like-counter" id="like-count">0</div>
  <div class="like-label">إعجابات</div>
  <div class="like-name" id="username"></div>
</div>
<script>
let likeCount = 0;
let heartInterval = null;
let likeInterval = null;

const HEARTS = ['❤️','🧡','💛','💜','💙','💗','💖','💕'];

function spawnHeart() {
  const c = document.getElementById('heart-container');
  if (!c) return;
  const h = document.createElement('div');
  h.className = 'heart';
  h.textContent = HEARTS[Math.floor(Math.random() * HEARTS.length)];
  h.style.left = Math.random() * 90 + '%';
  h.style.animationDuration = (1.5 + Math.random() * 2) + 's';
  h.style.animationDelay = Math.random() * .5 + 's';
  h.style.fontSize = (18 + Math.random() * 18) + 'px';
  c.appendChild(h);
  setTimeout(() => h.remove(), 4000);
}

function startHearts() {
  stopHearts();
  heartInterval = setInterval(spawnHeart, 180);
  likeInterval = setInterval(() => {
    likeCount += Math.floor(Math.random() * 7 + 1);
    const el = document.getElementById('like-count');
    if (el) { el.textContent = likeCount.toLocaleString(); el.style.animation = 'none'; requestAnimationFrame(() => el.style.animation = ''); }
  }, 400);
  for (let i = 0; i < 12; i++) setTimeout(spawnHeart, i * 60);
}

function stopHearts() { clearInterval(heartInterval); clearInterval(likeInterval); }

function updateOverlay(data) {
  if (data.name) document.getElementById('username').textContent = data.name;
  if (typeof data.count !== 'undefined') likeCount = data.count;
  likeCount = 0;
  startHearts();
}

// Auto-start
startHearts();
</script>
</body>
</html>
