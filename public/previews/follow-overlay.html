<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Follow Overlay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap');

        :root {
            --primary-glow: #bc13fe;
            --secondary-glow: #7a10f7;
            --text-color: #ffffff;
            --transition-speed: 0.6s;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 600px;
            height: 340px;
            overflow: hidden;
            background: transparent;
            font-family: 'Cairo', sans-serif;
        }

        #overlay-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(30px) scale(0.9);
            transition: all var(--transition-speed) cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        #overlay-container.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Particle Background */
        .particles-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Avatar Styling */
        .avatar-section {
            position: relative;
            width: 180px;
            height: 180px;
            margin-left: 20px;
            z-index: 2;
        }

        .avatar-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--text-color);
            box-shadow: 0 0 25px var(--primary-glow), inset 0 0 15px var(--primary-glow);
            position: relative;
            z-index: 5;
        }

        /* Animated Orbit Rings */
        .orbit {
            position: absolute;
            top: -15px;
            left: -15px;
            right: -15px;
            bottom: -15px;
            border: 2px solid var(--primary-glow);
            border-radius: 50%;
            opacity: 0.5;
            animation: rotate 4s linear infinite;
        }

        .orbit::before {
            content: '';
            position: absolute;
            top: 50%;
            left: -6px;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 15px #fff, 0 0 30px var(--primary-glow);
        }

        .orbit-2 {
            top: -25px;
            left: -25px;
            right: -25px;
            bottom: -25px;
            border-style: dashed;
            animation: rotate 6s linear infinite reverse;
            opacity: 0.3;
        }

        /* Text Content */
        .text-section {
            display: flex;
            flex-direction: column;
            z-index: 2;
            padding-right: 20px;
        }

        .username {
            font-size: 48px;
            font-weight: 900;
            color: var(--text-color);
            text-shadow: 0 0 10px var(--primary-glow), 0 0 20px var(--primary-glow);
            margin: 0;
            line-height: 1.2;
            opacity: 0;
            transform: translateX(-30px);
            transition: all 0.5s ease 0.3s;
        }

        .show .username {
            opacity: 1;
            transform: translateX(0);
        }

        .follow-msg {
            font-size: 28px;
            color: var(--text-color);
            margin-top: -5px;
            font-weight: 700;
            background: linear-gradient(to left, #fff, var(--primary-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease 0.5s;
        }

        .show .follow-msg {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

    <div id="overlay-container">
        <div class="avatar-section">
            <div class="orbit"></div>
            <div class="orbit orbit-2"></div>
            <img id="user-avatar" class="avatar-image" src="https://i.postimg.cc/mD3rqWsn/Gemini-Generated-Image-3o7b5m3o7b5m3o7b.png" alt="Avatar">
        </div>
        <div class="text-section">
            <div id="user-name" class="username">Alice_Wonder</div>
            <div class="follow-msg">شكراً على المتابعة</div>
        </div>
    </div>

    <script>
        let hideTimeout;

        function updateOverlay(data) {
            const container = document.getElementById('overlay-container');
            const nameEl = document.getElementById('user-name');
            const avatarEl = document.getElementById('user-avatar');

            // Reset if already showing
            container.classList.remove('show');
            clearTimeout(hideTimeout);

            // Small delay to allow reset animation
            setTimeout(() => {
                if (data.name) nameEl.innerText = data.name;
                if (data.avatar) avatarEl.src = data.avatar;

                container.classList.add('show');

                // Auto hide after 6 seconds
                hideTimeout = setTimeout(() => {
                    container.classList.remove('show');
                }, 6000);
            }, 100);
        }

        // Preview trigger for testing
        window.onload = () => {
            updateOverlay({
                name: "Alice_Wonder",
                avatar: "https://i.postimg.cc/mD3rqWsn/Gemini-Generated-Image-3o7b5m3o7b5m3o7b.png"
            });
        };
    </script>
</body>
</html>
